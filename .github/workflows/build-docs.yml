name: Build Documentation

on:
  pull_request:
    branches:
      - main
      - 'release/**'
  push:
    branches:
      - main

jobs:
  build:
    name: Build Docusaurus Site
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build documentation
        run: yarn build

  trigger-search-reindex:
    name: Trigger Algolia Crawl
    # A full re-crawl takes hours, so firing one on every content merge would
    # keep the crawler running constantly for no benefit - routine content
    # freshness is already handled by the crawler's daily schedule. The only
    # thing that BREAKS search is a version-layout change that desyncs the
    # docsearch tags from the index (see 8.5.0, 2026-07-09). So trigger a crawl
    # only when the version files change; everything else rides the daily crawl.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect version-layout change
        id: versions
        run: |
          if git diff --name-only HEAD~1 HEAD | grep -qE '(^versions\.json$|docusaurus\.config\.(ts|js))'; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No version-layout change in this push; the daily scheduled crawl will keep content fresh."
          fi

      - name: Trigger crawl of docs.scandit.com
        if: steps.versions.outputs.changed == 'true'
        env:
          CRAWLER_USER_ID: ${{ secrets.ALGOLIA_CRAWLER_USER_ID }}
          CRAWLER_API_KEY: ${{ secrets.ALGOLIA_CRAWLER_API_KEY }}
        run: |
          if [ -z "$CRAWLER_USER_ID" ] || [ -z "$CRAWLER_API_KEY" ]; then
            echo "Algolia crawler credentials not set as repository secrets; skipping."
            exit 0
          fi
          # Deployment runs outside this repository; give it time to publish
          # before the crawler fetches pages.
          sleep 600
          curl -sf -X POST \
            -u "$CRAWLER_USER_ID:$CRAWLER_API_KEY" \
            "https://crawler.algolia.com/api/1/crawlers/9256529a-c31f-42fa-817f-5ed79fd38a08/reindex" \
            || echo "Crawl trigger failed (a crawl may already be running); the scheduled crawl will catch up."
